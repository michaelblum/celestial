<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Translucent Polyhedron</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050208;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-top {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d187ff;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(186, 73, 255, 0.5);
            z-index: 10;
        }

        /* Collapsing Sidebar Styles */
        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            z-index: 20;
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(20, 10, 30, 0.85);
            backdrop-filter: blur(8px);
            border-right: 1px solid rgba(209, 135, 255, 0.3);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
        }
        #sidebar.expanded { width: 340px; }
        #sidebar.collapsed { width: 60px; }

        /* Icon Navigation Rail */
        #nav-rail {
            width: 60px;
            min-width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            border-right: 1px solid rgba(74, 43, 110, 0.4);
            background: rgba(15, 5, 25, 0.6);
            overflow-y: auto;
        }
        #nav-rail::-webkit-scrollbar { display: none; }
        .nav-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #a060d0;
            transition: all 0.2s;
        }
        .nav-icon:hover { background: rgba(188, 19, 254, 0.2); color: #fff; }
        .nav-icon.active { background: #bc13fe; color: #fff; box-shadow: 0 0 10px rgba(188, 19, 254, 0.5); }
        .nav-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

        #toggle-sidebar {
            margin-top: auto;
            margin-bottom: 20px;
        }

        /* Content Area */
        #content-area {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }
        .panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            padding: 80px 20px 80px 20px;
            box-sizing: border-box;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
        }
        .panel.active {
            opacity: 1;
            pointer-events: auto;
        }
        #content-area::-webkit-scrollbar, .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .panel::-webkit-scrollbar-thumb { background: #4a2b6e; border-radius: 4px; }

        /* Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(42, 27, 61, 0.4);
            border: 1px solid rgba(74, 43, 110, 0.5);
            padding: 10px;
            border-radius: 6px;
        }
        .control-row { display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #bc13fe; padding-bottom: 5px;}
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #d187ff; font-weight: bold; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.8rem; text-transform: none; color: #fff; margin: 4px 0;}
        select, input[type="color"] { background: #1a0b2e; border: 1px solid #4a2b6e; color: white; padding: 8px; border-radius: 4px; cursor: pointer; outline: none; width: 100%; box-sizing: border-box; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #2a1b3d; border-radius: 3px; outline: none; padding: 0; margin: 6px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #bc13fe; border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px rgba(188, 19, 254, 0.5); transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type="color"] { height: 32px; padding: 2px; }

        .dual-slider-container { position: relative; width: 100%; height: 20px; margin: 4px 0; }
        .dual-slider-track { position: absolute; top: 7px; left: 0; width: 100%; height: 6px; background: #2a1b3d; border-radius: 3px; }
        .dual-slider-fill { position: absolute; top: 7px; height: 6px; background: #bc13fe; border-radius: 3px; }
        .dual-slider-container input[type="range"] { position: absolute; top: 0; left: 0; width: 100%; margin: 0; background: transparent; pointer-events: none; }
        .dual-slider-container input[type="range"]::-webkit-slider-thumb { pointer-events: auto; position: relative; z-index: 2; }
        .dual-slider-container input[type="range"]::-webkit-slider-runnable-track { background: transparent; border: none; }

        .val-display { font-size: 0.7rem; color: #aaa; font-family: monospace; display: flex; align-items: center; gap: 2px; }
        .editable-val { cursor: text; border-bottom: 1px dashed #bc13fe; padding: 0 2px; transition: all 0.2s; }
        .editable-val:hover { color: #fff; background: rgba(188, 19, 254, 0.2); border-radius: 2px; }
        .edit-input { background: #2a1b3d; border: 1px solid #bc13fe; color: white; font-family: monospace; font-size: 0.7rem; outline: none; border-radius: 2px; text-align: center; padding: 0 2px; margin: 0; }
        .edit-input::-webkit-outer-spin-button, .edit-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .edit-input[type=number] { -moz-appearance: textfield; }

        .btn-action { background: #2a1b3d; border: 1px solid #bc13fe; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: all 0.2s; text-transform: uppercase; text-align: center;}
        .btn-action:hover { background: #bc13fe; box-shadow: 0 0 8px rgba(188, 19, 254, 0.6); }

        .stepper-ui { display: flex; align-items: center; justify-content: center; gap: 4px; background: #1a0b2e; padding: 4px; border-radius: 6px; border: 1px solid #4a2b6e; }
        .stepper-ui button { background: transparent; border: 1px solid transparent; color: #d187ff; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .stepper-ui button:hover { background: rgba(188, 19, 254, 0.2); }
        .stepper-ui .bookend { background: #2a1b3d; font-size: 1.1rem; padding: 4px 12px; }
        .stepper-ui .bookend:hover { background: #4a2b6e; }
        #step-buttons-container { display: flex; gap: 4px; flex-grow: 1; }
        .step-stop { flex-grow: 1; font-size: 0.75rem; background: #2a1b3d !important; border: 1px solid #4a2b6e !important; }
        .step-stop.active { background: #bc13fe !important; color: white !important; box-shadow: 0 0 8px rgba(188, 19, 254, 0.6); border-color: #d187ff !important; }

        /* Context Menus */
        .context-menu {
            position: absolute;
            display: none;
            flex-direction: column;
            gap: 8px;
            background: rgba(20, 10, 30, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(209, 135, 255, 0.6);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            z-index: 100;
            min-width: 180px;
            color: white;
        }
        .context-menu.visible { display: flex; }
        .context-menu h3 { margin: 0 0 5px 0; font-size: 0.9rem; color: #fff; border-bottom: 1px solid #bc13fe; padding-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .context-menu label { font-size: 0.65rem; color: #d187ff; margin-bottom: -4px; }
        .context-menu select, .context-menu input[type="color"] { padding: 4px; height: 28px; }

        /* Animation Keyframes */
        @keyframes vibrate {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-2px, 0px) rotate(1deg); }
            30% { transform: translate(2px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-2px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .vibrate { animation: vibrate 0.2s linear infinite; }
    </style>
</head>
<body>
    <div id="ui-top">
        <h1>Celestial Object</h1>
    </div>

    <!-- Hidden file input for load function -->
    <input type="file" id="file-loader" style="display:none;" accept=".json">

    <!-- Context Menus -->
    <div id="ctx-object" class="context-menu">
        <h3>Object Properties</h3>
        <label>Geometry</label>
        <select id="ctx-shape">
            <option value="4">Tetrahedron</option>
            <option value="6">Hexahedron (Cube)</option>
            <option value="8">Octahedron</option>
            <option value="12">Dodecahedron</option>
            <option value="20">Icosahedron</option>
            <option value="90">Tetartoid (Pseudo)</option>
            <option value="91">Torus Knot</option>
            <option value="100">Sphere</option>
        </select>
        <label>Master Color</label>
        <input type="color" id="ctx-color">
        <label>Face Opacity</label>
        <input type="range" id="ctx-opacity" min="0" max="1" step="0.01">
        <label>Edge Opacity</label>
        <input type="range" id="ctx-edge-opacity" min="0" max="1" step="0.01">
        <label>Aura Reach</label>
        <input type="range" id="ctx-reach" min="0" max="3" step="0.01">
        <label>Aura Intensity</label>
        <input type="range" id="ctx-intensity" min="0" max="3" step="0.01">
        <label>Base Spin Speed</label>
        <input type="range" id="ctx-spin" min="0" max="0.1" step="0.001">
    </div>

    <div id="ctx-env" class="context-menu">
        <h3>Environment</h3>
        <label class="checkbox-label" style="margin-top: 0;"><input type="checkbox" id="ctx-grid"> Show Grid</label>
        <label>Grid Color</label>
        <input type="color" id="ctx-grid-color">
        <label class="checkbox-label"><input type="checkbox" id="ctx-grid-bend"> Space-Time Grid</label>
        <label>Grid Mass</label>
        <input type="range" id="ctx-grid-mass" min="0" max="3" step="0.1">
        <label class="checkbox-label"><input type="checkbox" id="ctx-ortho"> Orthographic</label>
        <label>Perspective FOV</label>
        <input type="range" id="ctx-fov" min="10" max="120" step="1">
    </div>

    <div id="sidebar" class="expanded">
        <div id="nav-rail">
            <div class="nav-icon active" data-target="panel-geom" title="Geometry">
                <svg viewBox="0 0 24 24">
                   <rect x="3" y="3" width="12" height="12"></rect>
                   <rect x="9" y="9" width="12" height="12"></rect>
                   <line x1="3" y1="3" x2="9" y2="9"></line>
                   <line x1="15" y1="3" x2="21" y2="9"></line>
                   <line x1="3" y1="15" x2="9" y2="21"></line>
                   <line x1="15" y1="15" x2="21" y2="21"></line>
                </svg>
            </div>
            <div class="nav-icon" data-target="panel-colors" title="Colors & Appearance">
                <svg viewBox="0 0 24 24">
                   <circle cx="12" cy="12" r="10"></circle>
                   <path d="M12 2v10l8.5-5.5"></path>
                   <path d="M12 12l-8.5 5.5"></path>
                   <path d="M12 12l-8.5-5.5"></path>
                   <path d="M12 12v10"></path>
                   <path d="M12 12l8.5 5.5"></path>
                </svg>
            </div>
            <div class="nav-icon" data-target="panel-anim" title="Animation and Effects">
                <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <div class="nav-icon" data-target="panel-env" title="Environment & Camera">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
            </div>
            
            <div class="nav-icon" id="toggle-sidebar" title="Toggle Sidebar" style="stroke:currentColor; margin-top: auto; margin-bottom: 15px;">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>

            <!-- Save & Load Buttons -->
            <div class="nav-icon" id="btn-save" title="Save Configuration" style="stroke:currentColor; margin-bottom: 5px;">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </div>
            <div class="nav-icon" id="btn-load" title="Load Configuration" style="stroke:currentColor; margin-bottom: 15px;">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>

            <!-- Randomize Button (Die) -->
            <div class="nav-icon" id="btn-randomize" title="Randomize Parameters" style="stroke:currentColor; margin-bottom: 20px;">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8" cy="8" r="1.5" fill="currentColor" stroke="none"></circle>
                    <circle cx="16" cy="8" r="1.5" fill="currentColor" stroke="none"></circle>
                    <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
                    <circle cx="8" cy="16" r="1.5" fill="currentColor" stroke="none"></circle>
                    <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"></circle>
                </svg>
            </div>
        </div>

        <div id="content-area">
            <!-- Geometry Panel -->
            <div id="panel-geom" class="panel active">
                <h2>Geometry</h2>
                <div class="control-group">
                    <label>Base Shape</label>
                    <select id="shapeSelect">
                        <option value="4">Tetrahedron</option>
                        <option value="6" selected>Hexahedron (Cube)</option>
                        <option value="8">Octahedron</option>
                        <option value="12">Dodecahedron</option>
                        <option value="20">Icosahedron</option>
                        <option value="90">Tetartoid (Pseudo)</option>
                        <option value="91">Torus Knot</option>
                        <option value="100">Sphere</option>
                    </select>
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label>Stellation (Pull/Push)</label>
                        <div class="val-display"><span id="stellationVal">0.00</span></div>
                    </div>
                    <input type="range" id="stellationSlider" min="-1" max="2" step="0.05" value="0">
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label>Face Opacity</label>
                        <div class="val-display"><span id="opacityVal">0.25</span></div>
                    </div>
                    <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.25">
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label>Edge Opacity</label>
                        <div class="val-display"><span id="edgeOpacityVal">1.00</span></div>
                    </div>
                    <input type="range" id="edgeOpacitySlider" min="0" max="1" step="0.01" value="1.00">
                </div>

                <div class="control-group">
                    <label class="checkbox-label"><input type="checkbox" id="maskToggle" checked> Hollow Core View</label>
                    <label class="checkbox-label"><input type="checkbox" id="interiorEdgesToggle" checked> Show Interior Edges</label>
                    <label class="checkbox-label"><input type="checkbox" id="specularToggle" checked> Specular Highlights</label>
                </div>
            </div>

            <!-- Colors Panel -->
            <div id="panel-colors" class="panel">
                <h2>Appearance</h2>
                <div class="control-group">
                    <select id="presetSelect">
                        <option value="default">Presets: Default Theme</option>
                        <option value="blackhole">Presets: Black Hole</option>
                        <option value="crystal">Presets: Pure Crystal</option>
                        <option value="neon">Presets: Neon Ghost</option>
                    </select>
                </div>

                <div class="control-group">
                    <div class="control-row"><label>Master Color</label></div>
                    <input type="color" id="masterColorPicker" value="#bc13fe">
                </div>

                <div class="control-group">
                    <label>Individual Colors</label>
                    <div class="control-row"><label style="font-size:0.6rem;">Faces</label><input type="color" id="faceColorPicker" value="#bc13fe" style="width: 70%;"></div>
                    <div class="control-row"><label style="font-size:0.6rem;">Edges</label><input type="color" id="edgeColorPicker" value="#bc13fe" style="width: 70%;"></div>
                    <div class="control-row"><label style="font-size:0.6rem;">Aura</label><input type="color" id="auraColorPicker" value="#bc13fe" style="width: 70%;"></div>
                </div>
            </div>

            <!-- Animation Panel -->
            <div id="panel-anim" class="panel">
                <h2>Cosmic Phenomena</h2>
                <div class="control-group">
                    <label class="checkbox-label"><input type="checkbox" id="pulsarToggle"> Pulsar Beams</label>
                    <label class="checkbox-label"><input type="checkbox" id="accretionToggle"> Accretion Disk</label>
                    <label class="checkbox-label"><input type="checkbox" id="gammaToggle"> Gamma Rays</label>
                    <label class="checkbox-label"><input type="checkbox" id="neutrinoToggle"> Neutrino Jets</label>
                </div>

                <h2>Animation & Path</h2>
                
                <div class="control-group">
                    <div class="control-row">
                        <label>Base Spin Speed</label>
                        <div class="val-display"><span id="idleSpinVal">0.010</span></div>
                    </div>
                    <input type="range" id="idleSpinSlider" min="0.00" max="0.1" step="0.001" value="0.01">
                    <button class="btn-action" id="btn-quick-spin" style="margin-top: 5px;">Quick Spin Burst</button>
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label class="checkbox-label"><input type="checkbox" id="pathToggle"> Auto-Path</label>
                        <button class="btn-action" id="btn-pause" style="padding: 4px 8px;">Pause</button>
                    </div>

                    <div id="pathSettings" style="display: none; flex-direction: column; gap: 8px; margin-top: 10px;">
                        <div class="control-row">
                            <label class="checkbox-label"><input type="checkbox" id="centeredViewToggle"> Keep Centered</label>
                        </div>
                        <div class="control-row">
                            <label>Path Type</label>
                            <select id="pathTypeSelect" style="width: auto; padding: 4px;">
                                <option value="direct">Direct (Eased)</option>
                                <option value="curve">Smooth Arcs</option>
                            </select>
                        </div>
                        <div class="control-row">
                            <label class="checkbox-label"><input type="checkbox" id="showPathToggle"> Show Path Line</label>
                        </div>
                        <div class="control-row">
                            <label class="checkbox-label"><input type="checkbox" id="trailToggle"> Leave Trail</label>
                        </div>
                        <div id="trailSettings" style="display: none; flex-direction: column; gap: 4px; padding-left: 20px;">
                            <div class="control-row">
                                <label style="font-size:0.6rem;">Tail Length</label>
                                <div class="val-display"><span id="trailLengthVal">50</span></div>
                            </div>
                            <input type="range" id="trailLengthSlider" min="10" max="200" step="1" value="50">
                        </div>
                        <div class="control-row" style="margin-top: 6px;">
                            <label>Speed</label>
                            <div class="val-display"><span id="speedVal">1.0</span>&nbsp;pc/s</div>
                        </div>
                        <input type="range" id="speedSlider" min="0.1" max="10.0" step="0.1" value="1.0">
                    </div>
                </div>

                <h2>Aura Effects</h2>
                <div class="control-group">
                    <label class="checkbox-label"><input type="checkbox" id="auraToggle" checked> Enable Aura Glow</label>
                    <div id="auraIntensityWrapper">
                        <div class="control-row" style="margin-top: 5px;">
                            <label>Reach</label>
                            <div class="val-display"><span id="auraReachVal">1.00</span></div>
                        </div>
                        <input type="range" id="auraReachSlider" min="0" max="3" step="0.01" value="1.0">

                        <div class="control-row" style="margin-top: 5px;">
                            <label>Intensity</label>
                            <div class="val-display"><span id="auraIntensityVal">1.00</span></div>
                        </div>
                        <input type="range" id="auraIntensitySlider" min="0" max="3" step="0.01" value="1.0">
                        
                        <div class="control-row" style="margin-top: 5px;">
                            <label>Pulse Rate</label>
                            <div class="val-display"><span id="pulseRateVal">0.005</span></div>
                        </div>
                        <input type="range" id="pulseRateSlider" min="0.001" max="0.02" step="0.001" value="0.005">
                        
                        <div class="control-row" style="margin-top: 10px;">
                            <button class="btn-action" id="btn-spike" style="flex-grow: 1;">Spike Amplitude</button>
                            <input type="number" id="spikeMultiplier" value="1.5" min="1.1" max="50" step="0.1" class="edit-input" style="width: 50px; margin-left: 8px;" title="Spike Size Multiplier">
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <h2 style="font-size:0.8rem; margin:0; border:none;">Particle Effects</h2>
                    <div id="btn-supercharge" class="btn-action" style="position: relative; overflow: hidden; user-select: none; margin-top: 5px; height: 28px; display: flex; align-items: center; justify-content: center;">
                        <div id="charge-fill" style="position: absolute; top:0; left:0; height:100%; width:0%; background: rgba(255,255,255,0.3); pointer-events:none; transition: width 0.1s linear;"></div>
                        <span style="position:relative; z-index:2; pointer-events:none;">HOLD TO SUPER NOVA</span>
                    </div>
                </div>
            </div>

            <!-- Environment Panel -->
            <div id="panel-env" class="panel">
                <h2>Environment</h2>

        function makeEditable(id, getMin, getMax, isFloat, onChange) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.add('editable-val');
            el.title = "Click to type value";

            el.addEventListener('click', () => {
                const currentVal = el.innerText;
                const input = document.createElement('input');
                input.type = 'number';
                input.step = isFloat ? '0.01' : '1';
                input.value = currentVal;
                input.className = 'edit-input';
                
                input.style.width = Math.max(4, currentVal.length + 1) + 'ch';
                el.style.display = 'none';
                el.parentNode.insertBefore(input, el);
                input.focus();
                input.select();

                let isCommitted = false;

                function commit() {
                    if (isCommitted) return;
                    isCommitted = true;
                    let val = parseFloat(input.value);
                    if (isNaN(val)) val = parseFloat(currentVal);
                    const min = typeof getMin === 'function' ? getMin() : getMin;
                    const max = typeof getMax === 'function' ? getMax() : getMax;
                    val = Math.max(min, Math.min(max, val)); 
                    
                    el.innerText = isFloat ? val.toFixed(input.step.includes('.') ? input.step.split('.')[1].length : 0) : Math.round(val).toString();
                    el.style.display = '';
                    if(input.parentNode) input.parentNode.removeChild(input);
                    onChange(val);
                }

                input.addEventListener('blur', commit);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') commit();
                    if (e.key === 'Escape') {
                        if (isCommitted) return;
                        isCommitted = true;
                        el.style.display = '';
                        if(input.parentNode) input.parentNode.removeChild(input);
                    }
                });
            });
        }

        function createFlareGroup() {

            const m1 = new THREE.Mesh(geo, mat);
            m1.scale.set(1, 0.1, 0.1);
            const m2 = new THREE.Mesh(geo, mat);
            m2.scale.set(0.1, 1, 0.1);
            
            group.add(m1);
            group.add(m2);
            return group;
        }

        function init() {
            scene = new THREE.Scene();
            const aspect = window.innerWidth / window.innerHeight;
            
            perspCamera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
            perspCamera.position.z = 7.5;

            orthoCamera = new THREE.OrthographicCamera(frustumSize * aspect / - 2, frustumSize * aspect / 2, frustumSize / 2, frustumSize / - 2, 0.1, 1000);
            orthoCamera.position.z = 5;

            camera = perspCamera;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            buildGrid();

            // Enlarged starfield for panning views
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const posArray = new Float32Array(starCount * 3);
            for(let i = 0; i < starCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 200; }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMaterial = new THREE.PointsMaterial({ size: 0.04, color: 0xffffff });
            scene.add(new THREE.Points(starGeometry, starMaterial));

            polyGroup = new THREE.Group();
            scene.add(polyGroup);

            // Aura Texture Generation
            const glowCanvas = document.createElement('canvas');
            glowCanvas.width = 128; glowCanvas.height = 128;
            const ctx = glowCanvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);
            glowTexture = new THREE.CanvasTexture(glowCanvas);

            // 1. Glow Sprite (Reach)
            const spriteMat = new THREE.SpriteMaterial({ map: glowTexture, transparent: true, blending: THREE.AdditiveBlending, color: auraColor, depthWrite: false });
            glowSprite = new THREE.Sprite(spriteMat);
            scene.add(glowSprite); 

            // 2. Core Sprite (Intensity)
            const coreMat = new THREE.SpriteMaterial({ map: glowTexture, transparent: true, blending: THREE.AdditiveBlending, color: auraColor, depthWrite: false });
            coreSprite = new THREE.Sprite(coreMat);
            scene.add(coreSprite);

            // 3. Super Charge Spheroid
            chargeSpheroid = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, color: 0xffffff }));
            chargeSpheroid.visible = false;
            scene.add(chargeSpheroid);

            // 4. Super Nova Aftermath White Dwarf
            const wdCanvas = document.createElement('canvas');
            wdCanvas.width = 128; wdCanvas.height = 128;
            const wdCtx = wdCanvas.getContext('2d');
            const wdGrad = wdCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
            wdGrad.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            wdGrad.addColorStop(0.2, 'rgba(255, 255, 255, 1.0)');
            wdGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.4)');
            wdGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            wdCtx.fillStyle = wdGrad;
            wdCtx.fillRect(0, 0, 128, 128);
            whiteDwarfSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(wdCanvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
            whiteDwarfSprite.visible = false;
            scene.add(whiteDwarfSprite);

            // 5. Release Shockwave Objects
            const swSphereGeo = new THREE.SphereGeometry(1, 32, 32);
            const swSphereMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending});
            shockwaveSphere = new THREE.Mesh(swSphereGeo, swSphereMat);
            shockwaveSphere.visible = false;
            scene.add(shockwaveSphere);

            const swDiskGeo = new THREE.RingGeometry(0.01, 1, 64);
            const swDiskMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending});
            shockwaveDisk = new THREE.Mesh(swDiskGeo, swDiskMat);
            shockwaveDisk.visible = false;
            scene.add(shockwaveDisk);

            // Trail Initialization Pool
            for(let i=0; i<200; i++) {
                let s = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, blending: THREE.AdditiveBlending, depthWrite: false }));
                s.visible = false;
                scene.add(s);
                trailSprites.push(s);
            }

            // Charge Solid Flare Initialization (6 Total)
            for(let i=0; i<6; i++) {
                let flare = createFlareGroup();
                flare.visible = false;
                
                let rx = 0, ry = 0, rz = 0;
                if (i === 0) {} // XY
                else if (i === 1) { ry = Math.PI / 2; } // ZY
                else if (i === 2) { rx = Math.PI / 2; } // XZ
                else if (i === 3) { rz = Math.PI / 4; } // XY offset
                else if (i === 4) { ry = Math.PI / 2; rx = Math.PI / 4; } // ZY offset
                else if (i === 5) { rx = Math.PI / 2; ry = Math.PI / 4; } // XZ offset
                
                flare.userData = { baseX: rx, baseY: ry, baseZ: rz, targetS: 2.0, lastScale: 0, lastSpeed: 0 };
                flare.rotation.set(rx, ry, rz);
                polyGroup.add(flare);
                chargeFlares.push(flare);
            }

            // --- COSMIC PHENOMENA CREATION ---

            // Pulsar Beams (Tapering to half diameter at tips)
            pulsarGroup = new THREE.Group();
            pulsarGroup.visible = false;
            const bCanvas = document.createElement('canvas');
            bCanvas.width = 16; bCanvas.height = 256;
            const bCtx = bCanvas.getContext('2d');
            const bGrad = bCtx.createLinearGradient(0, 0, 0, 256);
            bGrad.addColorStop(0, 'rgba(255,255,255,0)');
            bGrad.addColorStop(0.5, 'rgba(255,255,255,1)');
            bGrad.addColorStop(1, 'rgba(255,255,255,0)');
            bCtx.fillStyle = bGrad;
            bCtx.fillRect(0, 0, 16, 256);
            const beamTexture = new THREE.CanvasTexture(bCanvas);
            
            const beamGeo = new THREE.CylinderGeometry(0.15, 0.15, 4.0, 16, 16, true); 
            // Pinch ends to 1/2 size
            const beamPos = beamGeo.attributes.position;
            for(let i=0; i<beamPos.count; i++) {
                let y = beamPos.getY(i);
                let scale = 1.0 - 0.5 * (Math.abs(y) / 2.0); // 1.0 at center, 0.5 at ends
                beamPos.setX(i, beamPos.getX(i) * scale);
                beamPos.setZ(i, beamPos.getZ(i) * scale);
            }
            beamGeo.computeVertexNormals();

            beamMat = new THREE.MeshBasicMaterial({
                map: beamTexture, color: auraColor, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
            });
            const beamMesh = new THREE.Mesh(beamGeo, beamMat);
            pulsarGroup.add(beamMesh);
            polyGroup.add(pulsarGroup);

            // Gamma Rays (New, extremely narrow, far reaching beam)
            gammaRaysGroup = new THREE.Group();
            gammaRaysGroup.visible = false;
            const gCanvas = document.createElement('canvas');
            gCanvas.width = 16; gCanvas.height = 256;
            const gCtx = gCanvas.getContext('2d');
            const gGrad = gCtx.createLinearGradient(0, 0, 0, 256);
            gGrad.addColorStop(0, 'rgba(255,255,255,0)');
            gGrad.addColorStop(0.3, 'rgba(255,255,255,0.05)'); // Very gradual gradient
            gGrad.addColorStop(0.5, 'rgba(255,255,255,1)');
            gGrad.addColorStop(0.7, 'rgba(255,255,255,0.05)');
            gGrad.addColorStop(1, 'rgba(255,255,255,0)');
            gCtx.fillStyle = gGrad;
            gCtx.fillRect(0, 0, 16, 256);
            
            const gGeo = new THREE.CylinderGeometry(0.02, 0.02, 15.0, 16, 1, true);
            gammaBeamMat = new THREE.MeshBasicMaterial({
                map: new THREE.CanvasTexture(gCanvas), color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
            });
            const gMesh = new THREE.Mesh(gGeo, gammaBeamMat);
            gammaRaysGroup.add(gMesh);
            polyGroup.add(gammaRaysGroup);


            // Accretion Disk
            accretionGroup = new THREE.Group();
            accretionGroup.visible = false;
            
            // Fading Gradient Disk Plane
            const diskCanvas = document.createElement('canvas');
            diskCanvas.width = 512; diskCanvas.height = 512;
            const dCtx = diskCanvas.getContext('2d');
            const dGrad = dCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
            dGrad.addColorStop(0, 'rgba(255,255,255,1)');
            dGrad.addColorStop(0.75, 'rgba(255,255,255,1)'); // Solid until ~R=3.0 (25% from edge of 4.0 disk)
            dGrad.addColorStop(1, 'rgba(255,255,255,0)'); // Fades fully at R=4.0
            dCtx.fillStyle = dGrad;
            dCtx.fillRect(0, 0, 512, 512);
            const diskTexture = new THREE.CanvasTexture(diskCanvas);

            // Extended bounds and highly smoothed margin to prevent aliasing jitter
            const diskGeo = new THREE.RingGeometry(0.8, 4.0, 128);
            diskMat = new THREE.MeshBasicMaterial({
                map: diskTexture, color: faceColor, transparent: true, opacity: 0.15, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
            });
            const diskMesh = new THREE.Mesh(diskGeo, diskMat);
            diskMesh.rotation.x = Math.PI / 2;
            accretionGroup.add(diskMesh);

            const baseRingMat = new THREE.MeshBasicMaterial({
                color: auraColor, transparent: true, opacity: 0.8, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
            });
            
            // 10 Relentless Unbroken Stream Rings
            for(let i=0; i<10; i++) {
                // IMPORTANT: Clone the material to decouple opacity states across rings!
                let rMat = baseRingMat.clone();
                let rMesh = new THREE.Mesh(new THREE.BufferGeometry(), rMat);
                rMesh.rotation.x = Math.PI / 2;
                rMesh.position.y = 0.01 + (i * 0.002); // strict distinct y offset
                accretionGroup.add(rMesh);
                
                // Ring configuration
                let targetWidth = 4.0 * (0.1 + Math.random() * 0.2); // 10% to 30% of main radius (4.0)
                let targetOpacity = 0.5 + Math.random() * 0.25;      // 50% to 75%
                
                accretionRings.push({ 
                    mesh: rMesh, 
                    radius: 4.0 * (i / 10), // Initialize evenly distributed from 0.0 to 4.0
                    targetW: targetWidth,
                    targetOp: targetOpacity
                });
            }
            
            polyGroup.add(accretionGroup);

            // True Point Flash (Absolutely single pixelated dot, rendering independent of camera scale)
            const pointGeo = new THREE.BufferGeometry();
            pointGeo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0], 3));
            const pointMat = new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: false, transparent: true, opacity: 0, depthWrite: false });
            flashVoxel = new THREE.Points(pointGeo, pointMat);
            polyGroup.add(flashVoxel);

            // Neutrinos Particles
            neutrinoGroup = new THREE.Group();
            neutrinoGroup.visible = false;
            for (let i = 0; i < 150; i++) {
                let p = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, color: auraColor, blending: THREE.AdditiveBlending, depthWrite: false }));
                p.scale.set(0.12, 0.12, 1);
                neutrinoGroup.add(p);
                neutrinoParticles.push({
                    mesh: p,
                    yPos: (Math.random() - 0.5) * 8.0,
                    speed: Math.random() * 2.5 + 1.5,
                    dir: Math.random() > 0.5 ? 1 : -1,
                    xOffset: (Math.random() - 0.5) * 0.075, // Radius maps to the tapered diameter
                    zOffset: (Math.random() - 0.5) * 0.075
                });
            }
            polyGroup.add(neutrinoGroup);


            pointLight = new THREE.PointLight(0xffffff, 1.5, 10);
            polyGroup.add(pointLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0x444444));

            updateGeometry(currentGeometryType);
            polyGroup.scale.set(z_depth, z_depth, z_depth);
            updateDualSliderUI();
            updateStepsUI();

            setupEventListeners();
            setupEditableLabels();

            animate();
        }

        function buildGrid() {
            if (gridHelper) {
                scene.remove(gridHelper);
                gridHelper.geometry.dispose();
                gridHelper.material.dispose();
            }
            if (isGridEnabled) {
                const size = 100;
                const step = size / gridDivs;
                const halfSize = size / 2;
                const segmentsPerLine = Math.max(gridDivs, 60);

                const vertices = [];

                for ( let i = 0, k = - halfSize; i <= gridDivs; i ++, k += step ) {
                    for (let s = 0; s < segmentsPerLine; s++) {
                        let y1 = -halfSize + (s * size / segmentsPerLine);
                        let y2 = -halfSize + ((s+1) * size / segmentsPerLine);
                        vertices.push( k, y1, 0, k, y2, 0 );
                    }
                }
                for ( let i = 0, k = - halfSize; i <= gridDivs; i ++, k += step ) {
                    for (let s = 0; s < segmentsPerLine; s++) {
                        let x1 = -halfSize + (s * size / segmentsPerLine);
                        let x2 = -halfSize + ((s+1) * size / segmentsPerLine);
                        vertices.push( x1, k, 0, x2, k, 0 );
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute( 'position', new THREE.Float32BufferAttribute( vertices, 3 ) );
                geometry.setAttribute( 'basePosition', new THREE.Float32BufferAttribute( [...vertices], 3 ) );

                const material = new THREE.LineBasicMaterial( { color: gridColor, transparent: true, opacity: 0.3 } );

                gridHelper = new THREE.LineSegments( geometry, material );
                gridHelper.position.z = -8;
                
                scene.add( gridHelper );
            }
        }

        function updatePathVisual() {
            if (pathLine) { scene.remove(pathLine); pathLine.geometry.dispose(); pathLine.material.dispose(); pathLine = null; }
            if (!isShowPathEnabled || !isPathEnabled) return;

            const pts = pathType === 'curve' ? smoothCurve.getPoints(100) : [...pathPoints, pathPoints[0]];
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            const mat = new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 2, transparent: true, opacity: 0.5, depthWrite: false });
            pathLine = new THREE.Line(geo, mat);
            scene.add(pathLine);
        }

        function fireExplosion() {
            // White explosion particles
            for(let i=0; i<150; i++) {
                let p = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, color: new THREE.Color(0xffffff), blending: THREE.AdditiveBlending, depthWrite: false }));
                p.position.copy(polyGroup.position);
                let phi = Math.acos(-1 + (2 * Math.random()));
                let theta = Math.sqrt(100 * Math.PI) * phi;
                let v = new THREE.Vector3(
                    Math.cos(theta) * Math.sin(phi),
                    Math.sin(theta) * Math.sin(phi),
                    Math.cos(phi)
                ).normalize().multiplyScalar(Math.random() * 0.4 + 0.1); 
                
                p.scale.set(0.5, 0.5, 1);
                scene.add(p);
                particles.push({ mesh: p, vel: v, life: 1.0 });
            }
        }
        
        function fireSuperNova() {
            isDestroyed = true;
            superNovaTimer = 5.0; // Wait 5 seconds for particles to stall and fade
            
            // --- Colored Particles Burst (Matching object edges) ---
            for(let i=0; i<150; i++) {
                let p = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, color: edgeColor, blending: THREE.AdditiveBlending, depthWrite: false }));
                p.position.copy(polyGroup.position);
                let phi = Math.acos(-1 + (2 * Math.random()));
                let theta = Math.sqrt(100 * Math.PI) * phi;
                
                // Outward burst speed (initially faster than white particles)
                let speed = 0.5 + Math.random() * 2.0; 
                let v = new THREE.Vector3(
                    Math.cos(theta) * Math.sin(phi),
                    Math.sin(theta) * Math.sin(phi),
                    Math.cos(phi)
                ).normalize().multiplyScalar(speed);
                
                p.scale.set(0.6, 0.6, 1);
                scene.add(p);
                
                // Varying friction causes them to stop at various radii in the frame
                coloredParticles.push({ mesh: p, vel: v, friction: 0.90 + Math.random() * 0.08 });
            }

            fireExplosion(); // Also trigger the white particles

            // Init White Dwarf core
            whiteDwarfSprite.position.copy(polyGroup.position);
            whiteDwarfSprite.material.opacity = 1.0;
            whiteDwarfSprite.scale.set(4.0, 4.0, 1.0);
            whiteDwarfSprite.visible = true;
        }

        function setupEventListeners() {
            // Sidebar Navigation
            const navIcons = document.querySelectorAll('.nav-icon[data-target]');
            const panels = document.querySelectorAll('.panel');
            navIcons.forEach(icon => {
                icon.addEventListener('click', () => {
                    navIcons.forEach(n => n.classList.remove('active'));
                    panels.forEach(p => p.classList.remove('active'));
                    icon.classList.add('active');
                    document.getElementById(icon.getAttribute('data-target')).classList.add('active');
                    document.getElementById('sidebar').classList.add('expanded');
                    document.getElementById('sidebar').classList.remove('collapsed');
                });
            });

            document.getElementById('toggle-sidebar').addEventListener('click', () => {
                const sb = document.getElementById('sidebar');
                if (sb.classList.contains('expanded')) {
                    sb.classList.remove('expanded'); sb.classList.add('collapsed');
                } else {
                    sb.classList.remove('collapsed'); sb.classList.add('expanded');
                }
            });

            // Action Buttons
            document.getElementById('btn-randomize').addEventListener('click', randomizeAll);

            document.getElementById('btn-save').addEventListener('click', () => {
                const config = getConfig();
                const jsonStr = JSON.stringify(config, null, 2);
                
                // Use fallback textarea for iframe clipboard copying
                const textArea = document.createElement("textarea");
                textArea.value = jsonStr;
                textArea.style.position = "fixed"; 
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error("Clipboard fallback failed", err);
                }
                document.body.removeChild(textArea);

                // Offer file download
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'celestial_config.json';
                a.click(); URL.revokeObjectURL(url);
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                document.getElementById('file-loader').click();
            });

            document.getElementById('file-loader').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const config = JSON.parse(ev.target.result);
                        applyConfig(config);
                    } catch(err) { console.error('Invalid JSON file', err); }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            });

            // Prevent default context menu
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Mouse Wheel Zoom / Scroll handler
            window.addEventListener('wheel', (e) => {
                // Ensure UI scroll areas are fully functional and block zooming
                if (e.target.closest('#sidebar') || e.target.closest('.context-menu')) return;
                
                e.preventDefault();
                if (camera.isPerspectiveCamera) {
                    perspCamera.position.z = Math.max(2, Math.min(50, perspCamera.position.z + e.deltaY * 0.01));
                } else {
                    orthoCamera.zoom = Math.max(0.1, Math.min(10, orthoCamera.zoom - e.deltaY * 0.005));
                    orthoCamera.updateProjectionMatrix();
                }
            }, { passive: false });

            // Bi-directional Context Menu Syncing
            const proxyInput = (ctxId, sidebarId) => {
                document.getElementById(ctxId).addEventListener('input', (e) => {
                    const sideEl = document.getElementById(sidebarId);
                    if (sideEl.type === 'checkbox') sideEl.checked = e.target.checked;
                    else sideEl.value = e.target.value;
                    sideEl.dispatchEvent(new Event('change'));
                    sideEl.dispatchEvent(new Event('input'));
                });
            };
            proxyInput('ctx-shape', 'shapeSelect'); proxyInput('ctx-color', 'masterColorPicker');
            proxyInput('ctx-opacity', 'opacitySlider'); proxyInput('ctx-edge-opacity', 'edgeOpacitySlider'); proxyInput('ctx-reach', 'auraReachSlider');
            proxyInput('ctx-intensity', 'auraIntensitySlider'); proxyInput('ctx-spin', 'idleSpinSlider'); 
            proxyInput('ctx-grid', 'gridToggle'); proxyInput('ctx-grid-color', 'gridColorPicker'); 
            proxyInput('ctx-ortho', 'orthoToggle'); proxyInput('ctx-fov', 'fovSlider');
            proxyInput('ctx-grid-bend', 'gridBendToggle'); proxyInput('ctx-grid-mass', 'gridMassSlider');

            // Master Interaction Listener (Drag / Rotate / Menu / Pan)
            window.addEventListener('mousedown', (e) => {
                const isUI = e.target.closest('#sidebar') || e.target.closest('#ui-top') || e.target.closest('.context-menu');
                if (isUI) return;

                document.querySelectorAll('.context-menu').forEach(m => m.classList.remove('visible'));
                isMenuOpen = false;

                const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);

                let intersects = false;
                if (!isDestroyed) { // Prevent interaction while destroyed
                    if (coreMesh && coreMesh.visible && raycaster.intersectObject(coreMesh).length > 0) intersects = true;
                    else if (depthMesh && depthMesh.visible && raycaster.intersectObject(depthMesh).length > 0) intersects = true;
                    else {
                        raycaster.params.Line.threshold = 0.2;
                        if (wireframeMesh && raycaster.intersectObject(wireframeMesh).length > 0) intersects = true;
                    }
                }

                if (e.button === 2) { 
                    isMenuOpen = true;
                    const menu = intersects ? document.getElementById('ctx-object') : document.getElementById('ctx-env');
                    
                    if (intersects) {
                        document.getElementById('ctx-shape').value = document.getElementById('shapeSelect').value;
                        document.getElementById('ctx-color').value = document.getElementById('masterColorPicker').value;
                        document.getElementById('ctx-opacity').value = document.getElementById('opacitySlider').value;
                        document.getElementById('ctx-edge-opacity').value = document.getElementById('edgeOpacitySlider').value;
                        document.getElementById('ctx-reach').value = document.getElementById('auraReachSlider').value;
                        document.getElementById('ctx-intensity').value = document.getElementById('auraIntensitySlider').value;
                        document.getElementById('ctx-spin').value = document.getElementById('idleSpinSlider').value;
                    } else {
                        document.getElementById('ctx-grid').checked = document.getElementById('gridToggle').checked;
                        document.getElementById('ctx-grid-color').value = document.getElementById('gridColorPicker').value;
                        document.getElementById('ctx-grid-bend').checked = document.getElementById('gridBendToggle').checked;
                        document.getElementById('ctx-grid-mass').value = document.getElementById('gridMassSlider').value;
                        document.getElementById('ctx-ortho').checked = document.getElementById('orthoToggle').checked;
                        document.getElementById('ctx-fov').value = document.getElementById('fovSlider').value;
                    }

                    menu.style.left = e.clientX + 'px';
                    menu.style.top = e.clientY + 'px';
                    menu.classList.add('visible');
                    
                    setTimeout(() => {
                        const rect = menu.getBoundingClientRect();
                        if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 10) + 'px';
                        if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 10) + 'px';
                    }, 0);

                } else if (e.button === 0) { 
                    if (e.shiftKey) {
                        if (intersects) {
                            isPanningObject = true;
                        } else {
                            isPanningCamera = true;
                        }
                        previousMouse.x = e.clientX; previousMouse.y = e.clientY;
                    } else {
                        if (intersects) {
                            isDraggingObject = true;
                            previousMouse.x = e.clientX; previousMouse.y = e.clientY;
                            lastMoveTime = performance.now();
                            dragVelocity = {x: 0, y: 0}; dragMomentumSpeed = 0;
                        } else if (!isPathEnabled && !isDestroyed) {
                            handleMove(e.clientX, e.clientY); 
                        }
                    }
                }
            });

            window.addEventListener('mousemove', (e) => {
                let dx = e.clientX - previousMouse.x;
                let dy = e.clientY - previousMouse.y;
                
                if (isPanningCamera) {
                    let panSpeed = camera.isPerspectiveCamera ? (camera.position.z * 0.0015) : (1.0 / (orthoCamera.zoom * 20.0));
                    camera.position.x -= dx * panSpeed;
                    camera.position.y += dy * panSpeed;
                    if (!isCenteredView) {
                        targetPosition.x -= dx * panSpeed;
                        targetPosition.y += dy * panSpeed;
                    }
                    previousMouse.x = e.clientX; previousMouse.y = e.clientY;
                } else if (isPanningObject && !isDestroyed) {
                    let panSpeed = camera.isPerspectiveCamera ? (camera.position.z * 0.0015) : (1.0 / (orthoCamera.zoom * 20.0));
                    polyGroup.position.x += dx * panSpeed;
                    polyGroup.position.y -= dy * panSpeed;
                    targetPosition.copy(polyGroup.position);
                    previousMouse.x = e.clientX; previousMouse.y = e.clientY;
                } else if (isDraggingObject && !isDestroyed) {
                    let currentTime = performance.now();
                    let dt = currentTime - lastMoveTime;
                    
                    if (dt > 0) {
                        dragVelocity.x = (dragVelocity.x * 0.5) + ((dx / dt) * 0.5);
                        dragVelocity.y = (dragVelocity.y * 0.5) + ((dy / dt) * 0.5);
                    }

                    let deltaRotationQuaternion = new THREE.Quaternion().setFromEuler(new THREE.Euler(dy * 0.005, dx * 0.005, 0, 'XYZ'));
                    polyGroup.quaternion.multiplyQuaternions(deltaRotationQuaternion, polyGroup.quaternion);

                    previousMouse.x = e.clientX; previousMouse.y = e.clientY;
                    lastMoveTime = currentTime;
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) {
                    isPanningCamera = false;
                    isPanningObject = false;
                    if (isDraggingObject) {
                        isDraggingObject = false;
                        let speed = Math.sqrt(dragVelocity.x**2 + dragVelocity.y**2);
                        if (speed > 0.05) {
                            dragMomentumAxis.set(dragVelocity.y, dragVelocity.x, 0).normalize();
                            dragMomentumSpeed = Math.min(speed * 0.05, 0.5); 
                        }
                    }
                }
            });

            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('presetSelect').addEventListener('change', (e) => applyPreset(e.target.value));
            
            document.getElementById('shapeSelect').addEventListener('change', (e) => {
                currentGeometryType = parseInt(e.target.value); updateGeometry(currentGeometryType);
            });
            document.getElementById('stellationSlider').addEventListener('input', (e) => {
                stellationFactor = parseFloat(e.target.value); document.getElementById('stellationVal').innerText = stellationFactor.toFixed(2); updateGeometry(currentGeometryType);
            });
            
            document.getElementById('masterColorPicker').addEventListener('input', (e) => {
                const hex = e.target.value;
                document.getElementById('faceColorPicker').value = hex; document.getElementById('edgeColorPicker').value = hex; document.getElementById('auraColorPicker').value = hex;
                faceColor.set(hex); edgeColor.set(hex); auraColor.set(hex); updateColors();
            });
            document.getElementById('faceColorPicker').addEventListener('input', (e) => { faceColor.set(e.target.value); updateColors(); });
            document.getElementById('edgeColorPicker').addEventListener('input', (e) => { edgeColor.set(e.target.value); updateColors(); });
            document.getElementById('auraColorPicker').addEventListener('input', (e) => { auraColor.set(e.target.value); updateColors(); });

            document.getElementById('opacitySlider').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value); document.getElementById('opacityVal').innerText = val.toFixed(2); updateOpacity(val);
            });
            document.getElementById('edgeOpacitySlider').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value); document.getElementById('edgeOpacityVal').innerText = val.toFixed(2); updateEdgeOpacity(val);
            });
            document.getElementById('maskToggle').addEventListener('change', (e) => { isMaskEnabled = e.target.checked; updateOpacity(currentOpacity); });
            document.getElementById('interiorEdgesToggle').addEventListener('change', (e) => {
                isInteriorEdgesEnabled = e.target.checked;
                if(depthMesh) depthMesh.visible = !isInteriorEdgesEnabled;
                updateOpacity(currentOpacity); 
            });
            document.getElementById('specularToggle').addEventListener('change', (e) => { isSpecularEnabled = e.target.checked; updateOpacity(currentOpacity); });

            // Cosmic Add-on Toggles
            document.getElementById('pulsarToggle').addEventListener('change', (e) => {
                isPulsarEnabled = e.target.checked;
                if(pulsarGroup) pulsarGroup.visible = isPulsarEnabled;
            });
            document.getElementById('accretionToggle').addEventListener('change', (e) => {
                isAccretionEnabled = e.target.checked;

        function getDepthStops() {
            let stops = [];
            for (let i = 0; i < steps; i++) {
                let t = i / (steps - 1);

        function triggerScaleAnimation(target_scale, step_index) {
            if (Math.abs(z_depth - target_scale) < 0.001) return;
