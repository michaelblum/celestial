        }

        function createStellatedGeometry(baseGeometry, factor) {
            if (Math.abs(factor) < 0.01) return baseGeometry;
            const nonIndexed = baseGeometry.toNonIndexed();
            const positionAttribute = nonIndexed.getAttribute('position');
            const count = positionAttribute.count;
            const newVertices = [];
            const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
            const centroid = new THREE.Vector3(), normal = new THREE.Vector3();
            const cb = new THREE.Vector3(), ab = new THREE.Vector3();

            for (let i = 0; i < count; i += 3) {
                vA.fromBufferAttribute(positionAttribute, i); vB.fromBufferAttribute(positionAttribute, i + 1); vC.fromBufferAttribute(positionAttribute, i + 2);
                centroid.copy(vA).add(vB).add(vC).divideScalar(3);
                cb.subVectors(vC, vB); ab.subVectors(vA, vB); normal.crossVectors(cb, ab).normalize();
                const peak = new THREE.Vector3().copy(centroid).add(normal.multiplyScalar(factor));

                newVertices.push(vA.x, vA.y, vA.z, vB.x, vB.y, vB.z, peak.x, peak.y, peak.z);
                newVertices.push(vB.x, vB.y, vB.z, vC.x, vC.y, vC.z, peak.x, peak.y, peak.z);
                newVertices.push(vC.x, vC.y, vC.z, vA.x, vA.y, vA.z, peak.x, peak.y, peak.z);
            }
            const stellatedGeometry = new THREE.BufferGeometry();
            stellatedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(newVertices, 3));
            stellatedGeometry.computeVertexNormals();
            return stellatedGeometry;
        }

        function createPseudoTetartoid(size) {
            const geo = new THREE.DodecahedronGeometry(size, 0);
            const pos = geo.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < pos.count; i++) {
                v.fromBufferAttribute(pos, i);
                const angle = v.y * 0.4;
                v.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
                pos.setXYZ(i, v.x, v.y, v.z);
            }
            geo.computeVertexNormals(); return geo;
        }

        function updateGeometry(type) {
            if (coreMesh) polyGroup.remove(coreMesh);
            if (wireframeMesh) polyGroup.remove(wireframeMesh);
            if (depthMesh) polyGroup.remove(depthMesh);

            let baseGeometry; const size = 1.0; 
            switch(type) {
                case 4: baseGeometry = new THREE.TetrahedronGeometry(size); break;
                case 8: baseGeometry = new THREE.OctahedronGeometry(size); break;
                case 12: baseGeometry = new THREE.DodecahedronGeometry(size); break;
                case 20: baseGeometry = new THREE.IcosahedronGeometry(size); break;
                case 90: baseGeometry = createPseudoTetartoid(size); break;
                case 91: baseGeometry = new THREE.TorusKnotGeometry(size*0.6, size*0.25, 64, 8); break;
                case 100: baseGeometry = new THREE.SphereGeometry(size, 32, 32); break;
                default: baseGeometry = new THREE.BoxGeometry(size, size, size); break;
            }

            const finalGeometry = createStellatedGeometry(baseGeometry, stellationFactor);

            const depthMat = new THREE.MeshBasicMaterial({ colorWrite: false, side: THREE.FrontSide, depthWrite: true, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 });
            depthMesh = new THREE.Mesh(finalGeometry, depthMat);
            depthMesh.renderOrder = 2; 
            depthMesh.visible = !isInteriorEdgesEnabled;
            polyGroup.add(depthMesh);

            const isSolid = currentOpacity >= 0.99;
            const coreMat = new THREE.MeshPhongMaterial({
                color: faceColor, transparent: !isSolid, opacity: currentOpacity,
                shininess: isSpecularEnabled ? 80 : 0, specular: isSpecularEnabled ? new THREE.Color(0x333333) : new THREE.Color(0x000000),
                side: isSolid ? THREE.FrontSide : THREE.DoubleSide, depthWrite: isSolid, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
            });
            coreMesh = new THREE.Mesh(finalGeometry, coreMat);
            coreMesh.renderOrder = 3; 
            coreMesh.visible = !isMaskEnabled; 
            polyGroup.add(coreMesh);

            const edgeGeo = new THREE.EdgesGeometry(finalGeometry);
            const edgeMat = new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 2, depthTest: true, transparent: true, opacity: currentEdgeOpacity });
            wireframeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
            wireframeMesh.renderOrder = 4; 
            polyGroup.add(wireframeMesh);
            
            updateColors(); 
        }

        function updateColors() {
            if (coreMesh) coreMesh.material.color.copy(faceColor);
            if (wireframeMesh) wireframeMesh.material.color.copy(edgeColor);
            if (glowSprite) glowSprite.material.color.copy(auraColor);
            if (pointLight) pointLight.color.copy(faceColor);
            if (pathLine) pathLine.material.color.copy(edgeColor);
            
            if (beamMat) beamMat.color.copy(auraColor);
            if (diskMat) diskMat.color.copy(faceColor);
            
            // Accretion rings now use unique material clones, loop to colorize
            if (accretionRings) {
                accretionRings.forEach(ring => ring.mesh.material.color.copy(auraColor));
            }
            if (neutrinoParticles) {
                neutrinoParticles.forEach(p => p.mesh.material.color.copy(auraColor));
            }
            // gammaBeamMat uses native 0xffffff so we intentionally don't colorize it here

            document.querySelector('#opacitySlider').style.background = `linear-gradient(to right, #${faceColor.getHexString()}, #2a1b3d)`;
        }

        function handleMove(clientX, clientY) {
            const mouse = new THREE.Vector2((clientX / window.innerWidth) * 2 - 1, -(clientY / window.innerHeight) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            const pos = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, pos)) {
                const travelVector = new THREE.Vector3().subVectors(pos, polyGroup.position);
                if (travelVector.length() > 0.1) {
                    moveRotationAxis.crossVectors(travelVector, new THREE.Vector3(0, 0, 1)).normalize();
                    moveRotationSpeed = Math.min(travelVector.length() * 0.15, 0.4);
                }
                targetPosition.copy(pos);
            }
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            perspCamera.aspect = aspect; perspCamera.updateProjectionMatrix();
            orthoCamera.left = -frustumSize * aspect / 2; orthoCamera.right = frustumSize * aspect / 2;
            orthoCamera.top = frustumSize / 2; orthoCamera.bottom = -frustumSize / 2; orthoCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            let dt = 0.016; 
            let activeRotationSpeed = idleSpinSpeed;

            // Calculate Universal Scale Control for Implosion/Explosion/Respawn 
            if (collapseTime > 0 && wasFullCharge) {
                let t = Math.max(0, collapseTime) / 0.75;
                novaScale = t * t * t; // Implosion down to 0
            } else if (isDestroyed) {
                novaScale = 0.0;
            } else if (isRespawning) {
                respawnTimer += dt;
                let progress = Math.min(respawnTimer / 2.0, 1.0); // 2 second respawn
                
                // easeOutElastic effect for respawn
                let c4 = (2.0 * Math.PI) / 3;
                novaScale = progress === 0 ? 0 : progress === 1 ? 1 : Math.pow(2, -10 * progress) * Math.sin((progress * 10 - 0.75) * c4) + 1;
                
                if (progress >= 1.0) isRespawning = false;
            } else {
                novaScale = 1.0;
            }

            // --- CAMERA TRACKING (STAY CENTERED) ---
            if (isCenteredView) {
                let lerpFactor = 0.1;
                perspCamera.position.x += (polyGroup.position.x - perspCamera.position.x) * lerpFactor;
                perspCamera.position.y += (polyGroup.position.y - perspCamera.position.y) * lerpFactor;
                orthoCamera.position.x += (polyGroup.position.x - orthoCamera.position.x) * lerpFactor;
                orthoCamera.position.y += (polyGroup.position.y - orthoCamera.position.y) * lerpFactor;
            } else {
                let lerpFactor = 0.1;
                perspCamera.position.x += (0 - perspCamera.position.x) * lerpFactor;
                perspCamera.position.y += (0 - perspCamera.position.y) * lerpFactor;
                orthoCamera.position.x += (0 - orthoCamera.position.x) * lerpFactor;
                orthoCamera.position.y += (0 - orthoCamera.position.y) * lerpFactor;
            }

            // --- PATH VISUALS ---
            if (pathLine) {
                let pathZOffset = ((z_depth - depth_range.min) / (depth_range.max - depth_range.min)) * 2.0 - 1.0;
                pathLine.position.z = pathZOffset; 
            }

            // --- GRID SPACE-TIME DEFORMATION ---
            if (gridHelper && gridHelper.geometry.attributes.basePosition) {
                const positions = gridHelper.geometry.attributes.position;
                const basePositions = gridHelper.geometry.attributes.basePosition;
                
                if (isGridBending && gridMass > 0) {
                    let projectedPos = new THREE.Vector3();
                    if (camera.isPerspectiveCamera) {
                        let dir = new THREE.Vector3().subVectors(polyGroup.position, camera.position).normalize();
                        let t = (-8 - camera.position.z) / dir.z;
                        projectedPos.copy(camera.position).add(dir.multiplyScalar(t));
                    } else {
                        let dir = new THREE.Vector3();
                        camera.getWorldDirection(dir);
                        let t = (-8 - polyGroup.position.z) / dir.z;
                        projectedPos.copy(polyGroup.position).add(dir.multiplyScalar(t));
                    }
                    gridHelper.worldToLocal(projectedPos);
                    
                    const influenceRadius = Math.max(gridMass * 2.5, 1.0);

                    for (let i = 0; i < positions.count; i++) {
                        const x = basePositions.getX(i);
                        const y = basePositions.getY(i);
                        const dx = x - projectedPos.x;
                        const dy = y - projectedPos.y;
                        const distSq = dx*dx + dy*dy;
                        
                        let zOffset = - (gridMass * 10.0) * Math.exp(-distSq / (influenceRadius * influenceRadius));
                        positions.setZ(i, basePositions.getZ(i) + zOffset);
                    }
                    positions.needsUpdate = true;
                } else if (positions.getZ(0) !== basePositions.getZ(0)) {
                    for (let i = 0; i < positions.count; i++) {
                        positions.setZ(i, basePositions.getZ(i));
                    }
                    positions.needsUpdate = true;
                }
            }

            // --- SUPER NOVA DESTROYED STATE ---
            if (isDestroyed) {
                superNovaTimer -= dt;
                
                // Handle colored particle cloud
                for (let i = coloredParticles.length - 1; i >= 0; i--) {
                    let cp = coloredParticles[i];
                    cp.mesh.position.add(cp.vel);
                    cp.vel.multiplyScalar(cp.friction); // slow to a stop
                    
                    // Fade out slowly in the final 3 seconds
                    if (superNovaTimer < 3.0) {
                        let op = Math.max(0, superNovaTimer / 3.0);
                        cp.mesh.material.opacity = op;
                    }
                    
                    if (superNovaTimer <= 0) {
                        scene.remove(cp.mesh);
                        cp.mesh.material.dispose();
                        coloredParticles.splice(i, 1);
                    }
                }

                // White Dwarf lingering logic
                if (superNovaTimer < 2.5) {
                    whiteDwarfSprite.material.opacity = Math.max(0, superNovaTimer / 2.5);
                    let ws = (superNovaTimer / 2.5) * 4.0 + 0.1;
                    whiteDwarfSprite.scale.set(ws, ws, 1.0);
                }

                if (superNovaTimer <= 0) {
                    isDestroyed = false;
                    whiteDwarfSprite.visible = false;
                    isRespawning = true;
                    respawnTimer = 0;
                }
            }

            // --- MOVEMENT & PATHING ---
            let isMotionPaused = isPaused || isMenuOpen || isDraggingObject || isPanningObject || isPanningCamera;

            if (!isMotionPaused && !isDestroyed) {
                if (isPathEnabled) {
                    let pathZOffset = ((z_depth - depth_range.min) / (depth_range.max - depth_range.min)) * 2.0 - 1.0; 
                    
                    if (pathType === 'curve') {
                        pathProgress += (pathSpeed * 0.02) * dt; 
                        if (pathProgress > 1) pathProgress -= 1;
                        let rawPt = smoothCurve.getPointAt(pathProgress);
                        targetPosition.set(rawPt.x, rawPt.y, rawPt.z + pathZOffset);
                    } else {
                        let p0 = pathPoints[currentPathIndex];
                        let p1 = pathPoints[(currentPathIndex + 1) % pathPoints.length];
                        let segmentLength = p0.distanceTo(p1);
                        
                        segmentProgress += (pathSpeed * 1.5 / segmentLength) * dt; 
                        if (segmentProgress >= 1.0) {
                            segmentProgress = 0; currentPathIndex = (currentPathIndex + 1) % pathPoints.length;
                        } else {
                            let easedT = Math.sin((segmentProgress - 0.5) * Math.PI) * 0.5 + 0.5; 
                            let rawPt = new THREE.Vector3().copy(p0).lerp(p1, easedT);
                            targetPosition.set(rawPt.x, rawPt.y, rawPt.z + pathZOffset);
                        }
                    }
                    polyGroup.position.lerp(targetPosition, 0.2); 
                } else {
                    polyGroup.position.lerp(targetPosition, 0.08); 
                }

                // Rotations
                if (quickSpinActive) {
                    let timeRemaining = quickSpinEndTime - performance.now();
                    if (timeRemaining > 0) {
                        let t = timeRemaining / 2000;
                        activeRotationSpeed += quickSpinSpeed * t * t; 
                        polyGroup.rotateOnWorldAxis(quickSpinAxis, quickSpinSpeed * t * t);
                    } else {
                        quickSpinActive = false;
                    }
                }

                if (moveRotationSpeed > 0.001) {
                    polyGroup.rotateOnWorldAxis(moveRotationAxis, moveRotationSpeed);
                    if(!isPathEnabled) moveRotationSpeed *= 0.96; 
                }
                
                polyGroup.rotation.x += activeRotationSpeed;
                polyGroup.rotation.y += activeRotationSpeed;
            }

            // Residual Momentum Physics 
            if (!isMotionPaused && !isPathEnabled && !isDestroyed && dragMomentumSpeed > 0.0001) {
                polyGroup.rotateOnWorldAxis(dragMomentumAxis, dragMomentumSpeed);
                dragMomentumSpeed *= 0.95; 
            }

            // --- TRAIL ---
            if (isTrailEnabled && !isPaused && !isMenuOpen && !isDraggingObject && !isDestroyed) {
                trailPositions.unshift(polyGroup.position.clone());
                if (trailPositions.length > trailLength) trailPositions.length = trailLength;
            } else if (!isTrailEnabled || isDestroyed) {
                trailPositions = [];
            }
            
            for(let i=0; i<trailSprites.length; i++) {
                if (i < trailPositions.length) {
                    trailSprites[i].visible = true;
                    trailSprites[i].position.copy(trailPositions[i]);
                    trailSprites[i].material.color.copy(faceColor);
                    let progress = i / trailPositions.length; 
                    trailSprites[i].material.opacity = currentOpacity * (1.0 - progress);
                    let tScale = z_depth * 0.5 * (1.0 - progress * 0.5); 
                    trailSprites[i].scale.set(tScale, tScale, 1);
                } else {
                    trailSprites[i].visible = false;
                }
            }

            // --- COSMIC PHENOMENA ANIMATIONS ---
            if (isAccretionEnabled && accretionRings && !isDestroyed) {
                let triggeredFlash = false;
                
                accretionRings.forEach(ring => {
                    // Accelerate strictly as it gets closer to center
                    let speed = 0.2 + (1.5 / Math.max(ring.radius, 0.4));
                    ring.radius -= speed * dt;

                    // Immediately respawn mathematically out of bounds for perfect streaming
                    if (ring.radius <= 0) {
                        ring.radius = 4.0; 
                        ring.targetW = 4.0 * (0.1 + Math.random() * 0.2);
                        ring.targetOp = 0.5 + Math.random() * 0.25;
                        triggeredFlash = true;
                    }
                    
                    let currentR = ring.radius;
                    let currentW = 0.01;
                    let currentOp = 0;
                    
                    if (currentR > 3.0) {
                        // Fade in and grow width identically mirrored with the static disk's outer gradient 
                        let t = (4.0 - currentR) / 1.0; 
                        currentW = 0.01 + (ring.targetW - 0.01) * t;
                        currentOp = ring.targetOp * t;
                    } else if (currentR > 1.0) {
                        // Maintain established presence
                        currentW = ring.targetW;
                        currentOp = ring.targetOp;
                    } else {
                        // Collapse towards zero crossing the core boundary
                        let t = currentR / 1.0;
                        currentW = ring.targetW * Math.max(t, 0.001); 
                        currentOp = ring.targetOp;
                    }
                    
                    if (currentR > 0.001) {
                        ring.mesh.visible = true;
                        if (ring.mesh.geometry) ring.mesh.geometry.dispose();
                        let innerR = Math.max(0.0001, currentR - currentW/2);
                        let outerR = Math.max(innerR + 0.0001, currentR + currentW/2);
                        ring.mesh.geometry = new THREE.RingGeometry(innerR, outerR, 128); 
                        ring.mesh.material.opacity = currentOp;
                    } else {
                        ring.mesh.visible = false; 
                    }
                });
                
                if (triggeredFlash) voxelFlashTimer = 1.0;
            } else {
                voxelFlashTimer = 0;
                if (isDestroyed && accretionRings) {
                    accretionRings.forEach(ring => ring.mesh.visible = false);
                }
            }

            // Voxel Flash Animation
            if (voxelFlashTimer > 0 && !isDestroyed) {
                voxelFlashTimer -= dt * 6.0; 
                if (flashVoxel) {
                    flashVoxel.material.opacity = Math.max(0, voxelFlashTimer);
                }
            } else if (flashVoxel) {
                flashVoxel.material.opacity = 0;
            }

            if (isNeutrinosEnabled && neutrinoParticles && !isDestroyed) {
                neutrinoParticles.forEach(p => {
                    p.yPos += p.speed * p.dir * dt * 3.0; // travel rapidly up/down poles
                    if (Math.abs(p.yPos) > 3.5) {
                        p.yPos = 0; // reset to center once extended far
                        
                        let r = Math.random() * 0.075; // strict bounds mapping tapered core tip diam
                        let theta = Math.random() * Math.PI * 2;
                        p.xOffset = r * Math.cos(theta);
                        p.zOffset = r * Math.sin(theta);
                    }
                    p.mesh.position.set(p.xOffset, p.yPos, p.zOffset);
                    p.mesh.material.opacity = 1.0 - (Math.abs(p.yPos) / 3.5); // Fade towards tips
                });
            }

            // --- Z-DEPTH SCALE INTERPOLATION ---
            if (scale_anim_active && !isDestroyed && !isRespawning) {
                const elapsed = performance.now() - scale_anim_start_time;
                const progress = Math.min(elapsed / 2000, 1.0);
                const ease = progress * progress * (3 - 2 * progress); 
                z_depth = scale_anim_start_val + (target_z_depth - scale_anim_start_val) * ease;
                document.getElementById('zDepthSlider').value = z_depth;
                document.getElementById('zDepthVal').innerText = z_depth.toFixed(2);
                if (progress >= 1.0) { z_depth = target_z_depth; scale_anim_active = false; }
            }
            
            // Globally apply unified Nova Scale for the implosion/respawn sizing
            polyGroup.scale.setScalar(z_depth * novaScale);

            // --- SUPER CHARGE & PARTICLES ---
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.mesh.position.add(p.vel);
                p.life -= dt;
                p.mesh.material.opacity = p.life;
                if(p.life <= 0) {
                    scene.remove(p.mesh); p.mesh.material.dispose(); particles.splice(i, 1);
                }
            }

            for(let i=inwardParticles.length-1; i>=0; i--) {
                let p = inwardParticles[i];
                p.life -= dt * 2.0; 
                if(p.life <= 0) {
                    scene.remove(p.mesh); p.mesh.material.dispose(); inwardParticles.splice(i, 1);
                } else {
                    p.mesh.position.lerpVectors(polyGroup.position, p.start, p.life);
                    p.mesh.material.opacity = p.life;
                }
            }

            // Shockwave Extension
            if (isShockwaveActive) {
                shockwaveTime += dt;
                
                // Sphere expands in 0.4s to 200 size
                let tSph = Math.min(shockwaveTime / 0.4, 1.0);
                let sphScale = tSph * 400; 
                shockwaveSphere.scale.set(sphScale, sphScale, sphScale);
                shockwaveSphere.material.opacity = 0.5 * (1.0 - Math.pow(tSph, 2));

                // Disk expands in 0.4s to 100 size
                let tDsk = Math.min(shockwaveTime / 0.4, 1.0);
                let dskScale = tDsk * 200;
                shockwaveDisk.scale.set(dskScale, dskScale, 1);
                shockwaveDisk.material.opacity = 0.8 * (1.0 - Math.pow(tDsk, 2));

                if (tSph >= 1.0 && tDsk >= 1.0) {
                    isShockwaveActive = false;
                }
            }

            // Central Aura Position processing (DRY)
            let auraPos = polyGroup.position.clone();
            let auraScaleMult = 1.0;
            
            if (isMaskEnabled) {
                const pushBackDist = 5.0; 
                if (camera.isPerspectiveCamera) {
                    const sightLine = new THREE.Vector3().subVectors(polyGroup.position, camera.position).normalize();
                    auraPos.addScaledVector(sightLine, pushBackDist);
                    const distToObject = camera.position.distanceTo(polyGroup.position);
                    const distToAura = camera.position.distanceTo(auraPos);
                    auraScaleMult = (distToAura / distToObject);
                } else {
                    let camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    auraPos.addScaledVector(camDir, pushBackDist);
                }
            }

            // Collapse Animation Handlers
            if (collapseTime > 0) {
                collapseTime -= dt;
                let t = Math.max(0, collapseTime) / 0.75;
                let ease = t * t * t; // Cubic ease in

                if (chargeSpheroid.visible) {
                    let s = chargeSpheroid.userData.currentScale * ease * auraScaleMult;
                    chargeSpheroid.scale.set(s, s, 1);
                }

                for(let i = 0; i < 6; i++) {
                    if (chargeFlares[i].visible) {
                        let fs = chargeFlares[i].userData.lastScale * ease;
                        chargeFlares[i].scale.setScalar(fs);
                        // Keep spinning
                        if (i % 2 === 0) chargeFlares[i].rotateZ(chargeFlares[i].userData.lastSpeed * dt * 50);
                        else chargeFlares[i].rotateZ(-chargeFlares[i].userData.lastSpeed * dt * 50);
                    }
                }

                if (collapseTime <= 0) {
                    chargeSpheroid.visible = false;
                    chargeFlares.forEach(f => {
                        f.visible = false;
                        f.rotation.set(f.userData.baseX, f.userData.baseY, f.userData.baseZ);
                    });
                    
                    if (wasFullCharge) {
                        isShockwaveActive = true;
                        shockwaveTime = 0;
                        shockwaveSphere.visible = true;
                        shockwaveSphere.position.copy(polyGroup.position);
                        shockwaveDisk.visible = true;
                        shockwaveDisk.position.copy(polyGroup.position);
                        shockwaveDisk.rotation.x = Math.PI / 2; // Flat on XZ plane
                        
                        fireSuperNova(); // Shatter Object
                        wasFullCharge = false;
                    } else {
                        fireExplosion(); // Regular particle fire for partial charges
                    }
                    chargeReleaseTimer = 0.5;
                }
            }

            // --- AURA EFFECTS ---
            auraSpike *= 0.92;
            const baseScale = 4.0 * auraReach * z_depth;
            const pulseOffset = Math.sin(Date.now() * auraPulseRate) * (0.4 * auraReach) * z_depth;
            const spikeBonus = baseScale * (spikeMultiplier - 1.0) * auraSpike; 
            
            let reachScale = baseScale + pulseOffset + spikeBonus;
            let currentReachColor = new THREE.Color(auraColor);
            let forceAuraVisible = false;

            if (isCharging) {
                chargeTime += dt;
                chargeLevel = Math.min(chargeTime / 3.0, 1.0); 
                
                if (chargeLevel >= 1.0) { 
                    document.getElementById('btn-supercharge').classList.add('vibrate'); 
                    if (Math.random() < 0.6) {
                        let p = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, color: new THREE.Color(0xffffff), blending: THREE.AdditiveBlending, depthWrite: false }));
                        let dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                        let spawnPos = polyGroup.position.clone().add(dir.multiplyScalar(4 + Math.random() * 3));
                        p.position.copy(spawnPos);
                        p.scale.set(0.15, 0.15, 1);
                        scene.add(p);
                        inwardParticles.push({ mesh: p, start: spawnPos, life: 1.0 }); 
                    }
                }
                document.getElementById('charge-fill').style.width = (chargeLevel * 100) + '%';
                
                forceAuraVisible = true;
                let shrinkFactor = 1.0 - (0.5 * chargeLevel); 
                reachScale = baseScale * shrinkFactor;
                currentReachColor.lerp(new THREE.Color(0xffffff), chargeLevel * 0.8);
                
                if (chargeLevel >= 1.0) reachScale += Math.random() * 0.3; 

                // Core Spheroid Growth
                chargeSpheroid.visible = true;
                chargeSpheroid.position.copy(auraPos);
                let maxSpheroidScale = z_depth * 1.5;
                let sScale = maxSpheroidScale * chargeLevel;
                chargeSpheroid.userData.currentScale = sScale;
                chargeSpheroid.scale.set(sScale * auraScaleMult, sScale * auraScaleMult, 1);

                // Tandem Flare Setup (6 Total Solid Spikes)
                for (let i = 0; i < 6; i++) {
                    let startTime = i * 0.4;
                    if (chargeTime > startTime) {
                         chargeFlares[i].visible = true;
                         let activeTime = chargeTime - startTime;
                         let s = 0;
                         
                         if (activeTime < 1.5) {
                             // Sawtooth/Stepped growth
                             let progress = activeTime / 1.5;
                             s = Math.floor(progress * 10) / 10 * 2.0;
                         } else {
                             // Jitter Oscillation 
                             if (Math.random() < 0.2) chargeFlares[i].userData.targetS = 1.0 + Math.random() * 1.0;
                             let currentS = chargeFlares[i].scale.x;
                             s = currentS + (chargeFlares[i].userData.targetS - currentS) * 0.3; 
                         }
                         
                         chargeFlares[i].userData.lastScale = s;
                         chargeFlares[i].scale.setScalar(s);
                         
                         // Accelerated spinning (double speed mapping)
                         let rTime = Math.min(activeTime, 3.0);
                         let speed = 0.08 * Math.pow(2, rTime); 
                         chargeFlares[i].userData.lastSpeed = speed;
                         
                         if (i % 2 === 0) chargeFlares[i].rotateZ(speed * dt * 50);
                         else chargeFlares[i].rotateZ(-speed * dt * 50);
                    } else {
                         chargeFlares[i].visible = false;
                    }
                }

            } else if (chargeReleaseTimer > 0) {
                forceAuraVisible = true;
                chargeReleaseTimer -= dt;
                let expandProgress = 1.0 - (Math.max(0, chargeReleaseTimer) / 0.5);
                reachScale = baseScale * (1.0 + expandProgress * 40.0); 
                currentReachColor.lerp(new THREE.Color(0xffffff), 1.0 - expandProgress);
            }

            // Glow Sprite (Outer Reach scaled collectively)
            if ((isAuraEnabled || forceAuraVisible) && glowSprite && !isDestroyed) {
                glowSprite.visible = true;
                glowSprite.position.copy(auraPos);
                let sr = reachScale * auraScaleMult * novaScale;
                glowSprite.scale.set(sr, sr, 1);
                glowSprite.material.color.copy(currentReachColor);
            } else if (glowSprite) {
                glowSprite.visible = false;
            }

            // Core Sprite (Inner Intensity scaled collectively)
            if (isAuraEnabled && coreSprite && !isDestroyed) {
                coreSprite.visible = true;
                coreSprite.position.copy(auraPos);
                
                let iFactor = auraIntensity / 3.0; 
                let ciScale = (0.2 + 1.8 * iFactor) * z_depth * auraScaleMult * novaScale;
                coreSprite.scale.set(ciScale, ciScale, 1);
                
                let coreColor = new THREE.Color(0xffffff).lerp(auraColor, iFactor);
                coreSprite.material.color.copy(coreColor);
                coreSprite.material.opacity = 1.0 - 0.6 * iFactor; 
            } else if (coreSprite) {
                coreSprite.visible = false;
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
